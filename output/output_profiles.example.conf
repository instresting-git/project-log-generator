# ============================================================
# Output Target Configuration File
# ============================================================
# Format: TOML
# Purpose: Define log send targets for generate/oneshot commands
#
# Usage:
#   python3 project.py generate --vendor cisco --product asa_firewall --output-conf local_syslog
#   python3 project.py oneshot --vendor huawei --product firewall --output-conf local_file

# ---- Local Syslog (UDP 514) ----
[local_syslog]
protocol = "syslog"
host = "127.0.0.1"
port = 514
facility = 16
severity = 5
description = "Local Syslog (UDP 514)"

# ---- Local TCP ----
[local_tcp]
protocol = "tcp"
host = "127.0.0.1"
port = 9000
description = "Local TCP receiver"

# ---- Local UDP ----
[local_udp]
protocol = "udp"
host = "127.0.0.1"
port = 9001
description = "Local UDP receiver"

# ---- Local HTTP ----
[local_http]
protocol = "http"
http_url = "http://127.0.0.1:8080/logs"
description = "Local HTTP collector"

# ---- File Output ----
[local_file]
protocol = "file"
file_path = "output/generated_logs.log"
description = "Local file output"

# ---- stdout ----
[console]
protocol = "stdout"
description = "Standard output (pipe to other tools)"

