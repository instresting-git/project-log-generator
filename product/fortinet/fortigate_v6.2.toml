# ============================================================
# FortiGate — FortiGate system, traffic, utm, event log
# ============================================================

[product]
name = "FortiGate_v6.2"
vendor = "FortiNet"
type = "firewall"
version = "6.2"

# ---- Traffic Log ----
[[logs]]
name = "traffic"
description = "Traffic flow logs (forward/deny/sniffer)"
template = 'date=%{YEAR}-%{MONTHNUM}-%{MONTHDAY} time=%{HOUR}:%{MINUTE}:%{SECOND} logid="%{FORTIGATE_EVENT_ID}" type="traffic" subtype="%{FORTIGATE_TRAFFIC_SUBTYPE}" level="%{LEVEL}" vd="%{FORTIGATE_VD}" eventtime=%{FORTIGATE_EVENTTIME} srcip=%{FORTIGATE_SRCIP} srcport=%{FORTIGATE_SRCPORT} srcintf="%{FORTIGATE_SRCINTF}" srcintfrole="%{FORTIGATE_SRCINTFROLE}" dstip=%{FORTIGATE_DSTIP} dstport=%{FORTIGATE_DSTPORT} dstintf="%{FORTIGATE_DSTINTF}" dstintfrole="%{FORTIGATE_DSTINTFROLE}" srcuuid="%{FORTIGATE_SRCUUID}" dstuuid="%{FORTIGATE_DSTUUID}" poluuid="%{FORTIGATE_POLUUID}" sessionid=%{FORTIGATE_SESSIONID} proto=%{FORTIGATE_PROTO} action="%{FORTIGATE_ACTION}" policyid=%{FORTIGATE_POLICYID} policytype="%{FORTIGATE_POLICYTYPE}" service="%{FORTIGATE_SERVICE}" dstcountry="%{FORTIGATE_DSTCOUNTRY}" srccountry="%{FORTIGATE_SRCCOUNTRY}" trandisp="%{FORTIGATE_TRANDISP}" transip=%{FORTIGATE_TRANSIP} transport=%{FORTIGATE_TRANSPORT} appid=%{FORTIGATE_APPID} app="%{FORTIGATE_APP}" appcat="%{FORTIGATE_APPCAT}" apprisk="%{FORTIGATE_APPRISK}" applist="%{FORTIGATE_APPLIST}" duration=%{FORTIGATE_DURATION} sentbyte=%{FORTIGATE_SENTBYTE} rcvdbyte=%{FORTIGATE_RCVDBYTE} sentpkt=%{FORTIGATE_SENTPKT} rcvdpkt=%{FORTIGATE_RCVDPKT} utmaction="%{FORTIGATE_UTMACTION}" countapp=%{FORTIGATE_COUNTAPP} osname="%{FORTIGATE_OSNAME}" mastersrcmac="%{FORTIGATE_MASTERSRCMAC}" srcmac="%{FORTIGATE_SRCMAC}" srcserver=%{FORTIGATE_SRCSERVER} utmref=%{FORTIGATE_UTMREF}'
rate = 100

[logs.fields]
# ---- Timestamp ----
YEAR = { pattern = "YEAR" }
MONTHNUM = { pattern = "MONTHNUM" }
MONTHDAY = { pattern = "MONTHDAY" }
HOUR = { pattern = "HOUR" }
MINUTE = { pattern = "MINUTE" }
SECOND = { pattern = "SECOND" }
FORTIGATE_EVENTTIME = { pattern = "FORTIGATE_EVENTTIME" }

# ---- Event / Severity ----
FORTIGATE_EVENT_ID = { pattern = "FORTIGATE_EVENT_ID" }
FORTIGATE_TRAFFIC_SUBTYPE = { pattern = "FORTIGATE_TRAFFIC_SUBTYPE" }
LEVEL = { pattern = "LEVEL" }
FORTIGATE_VD = { pattern = "FORTIGATE_VD" }

# ---- Source ----
FORTIGATE_SRCIP = { pattern = "IPV4_PRIVATE" }
FORTIGATE_SRCPORT = { pattern = "PORT" }
FORTIGATE_SRCINTF = { pattern = "FORTIGATE_SRCINTF" }
FORTIGATE_SRCINTFROLE = { pattern = "FORTIGATE_SRCINTFROLE" }
FORTIGATE_SRCUUID = { pattern = "UUID" }
FORTIGATE_SRCMAC = { pattern = "MAC" }
FORTIGATE_MASTERSRCMAC = { pattern = "MAC" }
FORTIGATE_SRCCOUNTRY = { pattern = "FORTIGATE_SRCCOUNTRY" }
FORTIGATE_SRCSERVER = { pattern = "FORTIGATE_SRCSERVER" }

# ---- Destination ----
FORTIGATE_DSTIP = { pattern = "IPV4_PUBLIC" }
FORTIGATE_DSTPORT = { pattern = "PORT_WELL_KNOWN" }
FORTIGATE_DSTINTF = { pattern = "FORTIGATE_DSTINTF" }
FORTIGATE_DSTINTFROLE = { pattern = "FORTIGATE_DSTINTFROLE" }
FORTIGATE_DSTUUID = { pattern = "UUID" }
FORTIGATE_DSTCOUNTRY = { pattern = "FORTIGATE_DSTCOUNTRY" }

# ---- Policy ----
FORTIGATE_POLICYID = { pattern = "FORTIGATE_POLICYID" }
FORTIGATE_POLICYTYPE = { pattern = "FORTIGATE_POLICYTYPE" }
FORTIGATE_POLUUID = { pattern = "UUID" }

# ---- Connection ----
FORTIGATE_SESSIONID = { pattern = "FORTIGATE_SESSIONID" }
FORTIGATE_PROTO = { pattern = "PROTO_NUM" }
FORTIGATE_ACTION = { pattern = "FORTIGATE_ACTION" }
FORTIGATE_SERVICE = { pattern = "FORTIGATE_SERVICE" }

# ---- NAT ----
FORTIGATE_TRANDISP = { pattern = "FORTIGATE_TRANDISP" }
FORTIGATE_TRANSIP = { pattern = "FORTIGATE_TRANSIP" }
FORTIGATE_TRANSPORT = { pattern = "PORT" }

# ---- Application ----
FORTIGATE_APPID = { pattern = "FORTIGATE_APPID" }
FORTIGATE_APP = { pattern = "FORTIGATE_APP" }
FORTIGATE_APPCAT = { pattern = "FORTIGATE_APPCAT" }
FORTIGATE_APPRISK = { pattern = "FORTIGATE_APPRISK" }
FORTIGATE_APPLIST = { pattern = "FORTIGATE_APPLIST" }

# ---- Traffic Stats ----
FORTIGATE_DURATION = { pattern = "FORTIGATE_DURATION" }
FORTIGATE_SENTBYTE = { pattern = "FORTIGATE_SENTBYTE" }
FORTIGATE_RCVDBYTE = { pattern = "FORTIGATE_RCVDBYTE" }
FORTIGATE_SENTPKT = { pattern = "FORTIGATE_SENTPKT" }
FORTIGATE_RCVDPKT = { pattern = "FORTIGATE_RCVDPKT" }
FORTIGATE_COUNTAPP = { pattern = "FORTIGATE_COUNTAPP" }

# ---- UTM / Security ----
FORTIGATE_UTMACTION = { pattern = "FORTIGATE_UTMACTION" }
FORTIGATE_UTMREF = { pattern = "FORTIGATE_UTMREF" }

# ---- Endpoint ----
FORTIGATE_OSNAME = { pattern = "FORTIGATE_OSNAME" }


# ---- Event Log ----
[[logs]]
name = "event_system"
description = "System Event logs"
template = 'date=%{YEAR}-%{MONTHNUM}-%{MONTHDAY} time=%{HOUR}:%{MINUTE}:%{SECOND} logid="%{FORTIGATE_EVENT_ID}" type="event" subtype="system" level="%{LEVEL}" vd="%{FORTIGATE_VD}" eventtime=%{FORTIGATE_EVENTTIME} logdesc="Admin login successful" sn="%{FORTIGATE_SN}" user="%{USERNAME}" ui="%{FORTIGATE_UI}" method="%{PROTO}" srcip=%{FORTIGATE_SRCIP} dstip=%{FORTIGATE_DSTIP} action="%{FORTIGATE_SYSTEM_EVENT_ACTION}" status="%{STATUS}" reason="none" profile="%{FORTIGATE_PROFILE}" msg="%{FORTIGATE_MSG}"'
# date=2019-05-13 time=11:20:54 logid="0100032001" type="event" subtype="system" level="information" vd="vdom1" eventtime=1557771654587081441 logdesc="Admin login successful" sn="1557771654" user="admin" ui="ssh(172.16.200.254)" method="ssh" srcip=172.16.200.254 dstip=172.16.200.2 action="login" status="success" reason="none" profile="super_admin" msg="Administrator admin logged in successfully from ssh(172.16.200.254)"
rate = 100

[logs.fields]
# ---- Timestamp ----
YEAR = { pattern = "YEAR" }
MONTHNUM = { pattern = "MONTHNUM" }
MONTHDAY = { pattern = "MONTHDAY" }
HOUR = { pattern = "HOUR" }
MINUTE = { pattern = "MINUTE" }
SECOND = { pattern = "SECOND" }
FORTIGATE_EVENTTIME = { pattern = "FORTIGATE_EVENTTIME" }

# ---- Event / Severity ----
FORTIGATE_EVENT_ID = { pattern = "FORTIGATE_EVENT_ID" }
LEVEL = { pattern = "LEVEL" }
FORTIGATE_VD = { pattern = "FORTIGATE_VD" }
FORTIGATE_SN = { pattern = "FORTIGATE_SN" }
USERNAME = { pattern = "USERNAME" }
FORTIGATE_UI = { pattern = "FORTIGATE_UI" }
PROTO = { pattern = "PROTO" }
FORTIGATE_SRCIP = { pattern = "IPV4_PRIVATE" }
FORTIGATE_DSTIP = { pattern = "IPV4_PRIVATE" }
FORTIGATE_SYSTEM_EVENT_ACTION = { pattern = "FORTIGATE_SYSTEM_EVENT_ACTION" }
STATUS = { pattern = "STATUS" }
FORTIGATE_PROFILE = { pattern = "WORD" }
FORTIGATE_MSG = { values = "Administrator admin logged in successfully from ssh(172.16.200.254)|Administrator admin logged out from ssh(172.16.200.254)|User bob succeeded in authentication|User alice failed authentication from 10.1.100.50|OSPF: RECV[Hello]: From 31.1.1.1 via port9:172.16.200.1: Invalid Area ID 0.0.0.0|OSPF: State change from Down to Init on port12|progress IPsec phase 1|IPsec phase 2 completed successfully|Virtual cluster's member state moved|Virtual cluster member state changed to work mode|Add a FortiClient Connection.|FortiClient connection removed for user skubas|SSL Alert received: unknown ca|SSL Fatal Alert: certificate expired|connector object discovered in addr-obj aws1, 81.2.69.142|Security Rating summary: score 5.0|HA status: primary become active|Interface port10 link up|Interface port12 link down|Configuration saved by admin via web GUI|Configuration change applied: policy ID 100 modified" }

[[logs]]
name = "event_router"
description = "Router Event logs"
template = 'date=%{YEAR}-%{MONTHNUM}-%{MONTHDAY} time=%{HOUR}:%{MINUTE}:%{SECOND} logid="%{FORTIGATE_EVENT_ID}" type="event" subtype="router" level="%{LEVEL}" vd="%{FORTIGATE_VD}" eventtime=%{FORTIGATE_EVENTTIME} logdesc="Routing log" msg="%{FORTIGATE_ROUTER_EVENT_MSG}"'
# date=2019-05-13 time=14:12:26 logid="0103020301" type="event" subtype="router" level="warning" vd="root" eventtime=1557781946677737955 logdesc="Routing log" msg="OSPF: RECV[Hello]: From 31.1.1.1 via port9:172.16.200.1: Invalid Area ID 0.0.0.0"
rate = 100

[logs.fields]
# ---- Timestamp ----
YEAR = { pattern = "YEAR" }
MONTHNUM = { pattern = "MONTHNUM" }
MONTHDAY = { pattern = "MONTHDAY" }
HOUR = { pattern = "HOUR" }
MINUTE = { pattern = "MINUTE" }
SECOND = { pattern = "SECOND" }
FORTIGATE_EVENTTIME = { pattern = "FORTIGATE_EVENTTIME" }

# ---- Event / Severity ----
FORTIGATE_EVENT_ID = { pattern = "FORTIGATE_EVENT_ID" }
LEVEL = { pattern = "LEVEL" }
FORTIGATE_VD = { pattern = "FORTIGATE_VD" }
FORTIGATE_ROUTER_EVENT_MSG = { values = "OSPF: RECV[Hello]: From 31.1.1.1 via port9:172.16.200.1: Invalid Area ID 0.0.0.0|OSPF: State change from Down to Init on port12|OSPF: State change from Init to 2-Way on port9|OSPF: State change from 2-Way to Full on port12|OSPF: RECV[LSUpdate]: From 10.0.0.1 via port9:172.16.200.1: Neighbor 10.0.0.1 is adjacent|OSPF: Neighbor 10.0.0.2 is dead on port12|OSPF: Received invalid checksum from 172.16.200.2" }

