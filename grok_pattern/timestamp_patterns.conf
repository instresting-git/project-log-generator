# ============================================================
# Timestamp-Related Grok Patterns
# ============================================================

# --- ISO 8601 ---
TIMESTAMP_ISO8601 %{YEAR}-%{MONTHNUM}-%{MONTHDAY}[T ]%{HOUR}:?%{MINUTE}(?::?%{SECOND})?%{ISO8601_TIMEZONE}?

# --- Syslog Timestamp ---
SYSLOGTIMESTAMP %{MONTH} +%{MONTHDAY} %{TIME}

# --- Common Timestamp Formats ---
MONTH \b(Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\b
MONTHNUM 0[1-9]|1[0-2]
MONTHDAY (?:0[1-9]|[12][0-9]|3[01])

DAY (?:Mon(?:day)?|Tue(?:sday)?|Wed(?:nesday)?|Thu(?:rsday)?|Fri(?:day)?|Sat(?:urday)?|Sun(?:day)?)

YEAR (?:\d\d){1,2}
HOUR (?:2[0-3]|[01]?[0-9])
MINUTE (?:[0-5][0-9])
SECOND (?:(?:[0-5][0-9]|60)(?:[:.,][0-9]+)?)

TIME %{HOUR}:%{MINUTE}(?::%{SECOND})?

# --- Timezone ---
ISO8601_TIMEZONE [+-][0-9]{2}:[0-9]{2}|Z
TZ [A-Z]{2,4}

# --- Epoch ---
UNIX_EPOCH_MS [0-9]{13}
UNIX_EPOCH_SEC [0-9]{10}

# --- Cisco-specific Timestamp ---
CISCO_TIMESTAMP %{MONTH} +%{MONTHDAY} %{YEAR} %{TIME}
CISCO_ASA_TIMESTAMP %{MONTH} %{MONTHDAY} %{YEAR} %{TIME}

# --- Juniper Timestamp ---
JUNIPER_TIMESTAMP %{YEAR}-%{MONTHNUM}-%{MONTHDAY} %{TIME}

# --- Huawei Timestamp ---
HUAWEI_TIMESTAMP %{YEAR}-%{MONTHNUM}-%{MONTHDAY} %{TIME}(?:%{ISO8601_TIMEZONE})?
