# ============================================================
# Network-Related Grok Patterns
# ============================================================

# --- IPv4 ---
IPV4 (?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)
IPV4_PRIVATE (?:10\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))|(?:172\.(?:1[6-9]|2[0-9]|3[01])\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))|(?:192\.168\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))
IPV4_PUBLIC (?:[1-9]|[1-9][0-9]|1[01][0-9]|12[0-6])\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)

# --- IPv6 ---
IPV6 (?:(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|(?:[0-9a-fA-F]{1,4}:){1,7}:|(?:[0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4})
IPV6_SHORT (?:[0-9a-fA-F]{1,4}:){0,5}::(?:[0-9a-fA-F]{1,4}:){0,5}[0-9a-fA-F]{1,4}

# --- PORT ---
PORT (?:[1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])
PORT_WELL_KNOWN (?:20|21|22|23|25|53|67|68|69|80|110|123|143|161|162|389|443|445|465|514|587|636|993|995|1433|1521|3306|3389|5432|6379|8080|8443|9090|9200|27017)

# --- MAC ---
MAC (?:[0-9a-fA-F]{2}[:-]){5}[0-9a-fA-F]{2}
MAC_CISCO (?:[0-9a-fA-F]{4}\.[0-9a-fA-F]{4}\.[0-9a-fA-F]{4})

# --- Subnet / CIDR ---
SUBNET_MASK (?:255\.){3}(?:255|254|252|248|240|224|192|128|0)|(?:255\.){2}(?:255|254|252|248|240|224|192|128|0)\.0|255\.(?:255|254|252|248|240|224|192|128|0)\.0\.0
CIDR (?:[0-9]|[12][0-9]|3[0-2])

# --- Interface ---
INTERFACE_NAME (?:eth[0-9]+|wan[0-9]+|lan[0-9]+|vlan[0-9]+|tunnel[0-9]+|lo|GigabitEthernet[0-9](/[0-9]+)?|TenGigabitEthernet[0-9](/[0-9]+)?|FastEthernet[0-9](/[0-9]+)?|Port-channel[0-9]+|ge-[0-9]/[0-9]/[0-9]|xe-[0-9]/[0-9]/[0-9])

# --- URL / Domain ---
DOMAIN [a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}
FQDN (?=.{1,255})[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}

# --- IP:PORT ---
SOCKET_ADDR %{IPV4}:%{PORT}

# --- Protocol ---
PROTO_NUM [1-9][0-9]{0,2}
PROTO ssh|tcp|udp|http