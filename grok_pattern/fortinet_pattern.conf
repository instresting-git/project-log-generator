# --- FortiGate Event ---
FORTIGATE_EVENT_ID [0-9]{10}
FORTIGATE_TRAFFIC_SUBTYPE forward|local|multicast|sniffer

# --- FortiGate Virtual Domain ---
FORTIGATE_VD root|vd[1-9][0-9]?

# --- FortiGate Interface ---
FORTIGATE_SRCINTF port[1-9][0-9]?
FORTIGATE_DSTINTF port[1-9][0-9]?

# --- FortiGate Interface Role ---
FORTIGATE_SRCINTFROLE undefined|lan|wan|dmz
FORTIGATE_DSTINTFROLE undefined|lan|wan|dmz

# --- FortiGate Action ---
FORTIGATE_ACTION close|deny|accept|timeout|client-rst|server-rst
FORTIGATE_SYSTEM_EVENT_ACTION login|logout|config|monitor|alert

# --- FortiGate Policy ---
FORTIGATE_POLICYTYPE policy|firewall
FORTIGATE_POLICYID [1-9][0-9]{0,3}

# --- FortiGate NAT ---
FORTIGATE_TRANDISP snat|dnat|no-nat|static-nat

# --- FortiGate Service ---
FORTIGATE_SERVICE HTTP|HTTPS|DNS|SMTP|FTP|SSH|IMAP|POP3|NTP|SNMP|LDAP|RDP|SYSLOG|SIP|H323|BGP|OSPF

# --- FortiGate Country ---
FORTIGATE_DSTCOUNTRY Canada|United States|China|Germany|Japan|Australia|Brazil|India|Russia|France|United Kingdom|Netherlands|Singapore
FORTIGATE_SRCCOUNTRY Canada|United States|China|Germany|Japan|Australia|Brazil|India|Russia|France|Reserved

# --- FortiGate Application ---
FORTIGATE_APPID [1-9][0-9]{3,5}
FORTIGATE_APP HTTP\.BROWSER_Firefox|HTTP\.BROWSER_Chrome|HTTP\.BROWSER_Edge|HTTP\.BROWSER_Safari|SSL\.TLS|DNS\.UDP|FTP\.FileZilla|SSH\.Putty|SMTP\.Outlook|HTTPS\.Generic|HTTP\.BROWSER_IE|HTTP\.API|HTTPS\.REST|SMB\.Windows
FORTIGATE_APPCAT Web\.Client|Network\.Service|Email\.Client|File\.Transfer|Remote\.Access|Media\.Streaming|Social\.Media|Cloud\.Service
FORTIGATE_APPRISK elevated|high|medium|low|critical
FORTIGATE_APPLIST g-default|block-high-risk|allow-business|default|strict|g-monitor

# --- FortiGate UTM ---
FORTIGATE_UTMACTION allow|block|monitor|warn
FORTIGATE_UTMREF [0-9]{4,6}-[0-9]{1,4}

# --- FortiGate Traffic Stats ---
FORTIGATE_DURATION [1-9][0-9]{0,5}
FORTIGATE_SENTBYTE [1-9][0-9]{1,7}
FORTIGATE_RCVDBYTE [1-9][0-9]{1,7}
FORTIGATE_SENTPKT [1-9][0-9]{1,4}
FORTIGATE_RCVDPKT [1-9][0-9]{1,4}
FORTIGATE_COUNTAPP [1-9][0-9]?

# --- FortiGate Endpoint ---
FORTIGATE_OSNAME Windows|Linux|Ubuntu|macOS|iOS|Android|Chrome OS
FORTIGATE_SRCSERVER 0|1

# --- FortiGate Timestamp ---
FORTIGATE_EVENTTIME [0-9]{16,19}

# --- FortiGate Session ---
FORTIGATE_SESSIONID [1-9][0-9]{4,8}

# --- FortiGate Serial Number ---
FORTIGATE_SN [0-9]{10}

# --- FortiGate UI ---
FORTIGATE_UI ssh\((?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\)